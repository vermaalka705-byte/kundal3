<!DOCTYPE html>
<html>
<head>
<title>Customers | Kundal Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --rose-dark:#8b4a55;
    --rose-main:#b76e79;
    --rose-light:#f7d6cc;
    --soft:#fdf8f2;
}

body{
    background:var(--soft);
    font-family:'Poppins',sans-serif;
}

/* HEADER */
.page-title{
    font-family:'Cinzel',serif;
}

/* CARD */
.card{
    border:none;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
}

/* TABLE */
.table thead{
    background:linear-gradient(135deg,var(--rose-main),var(--rose-light));
    color:white;
}

.table-hover tbody tr:hover{
    background:#f9ece8;
}

/* BUTTON */
.btn-outline-secondary{
    border-radius:50px;
}
</style>
</head>

<body>

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h4 class="page-title">👩‍💼 Customers</h4>
<a href="/admin/dashboard" class="btn btn-outline-secondary btn-sm">
← Back to Dashboard
</a>
</div>

<div class="card">
<div class="card-body">

<table class="table table-hover align-middle">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Joined</th>
</tr>
</thead>

<tbody>
{% for u in users %}
<tr>
<td>{{ u.id }}</td>
<td>{{ u.name }}</td>
<td>{{ u.email }}</td>
<td>{{ u.phone }}</td>
<td>{{ u.created_at.strftime("%d %b %Y") }}</td>
</tr>
{% endfor %}
</tbody>
</table>

{% if not users %}
<p class="text-center text-muted mt-4">
No customers found.
</p>
{% endif %}

</div>
</div>

</div>

</body>
</html>
