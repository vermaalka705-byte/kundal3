<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ӄʊռɖǟʟ | Create Account</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --rose-dark:#8b4a55;
    --rose-main:#b76e79;
    --rose-light:#f7d6cc;
    --soft:#fdf8f2;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#fff,var(--soft));
    min-height:100vh;
    display:flex;
    align-items:center;
}

/* CARD */
.register-card{
    background:white;
    border-radius:26px;
    box-shadow:0 25px 60px rgba(0,0,0,.15);
    padding:40px;
}

/* LOGO */
.brand{
    font-family:'Cinzel',serif;
    font-size:28px;
    letter-spacing:4px;
    text-transform:lowercase;
    background:linear-gradient(
        135deg,
        var(--rose-dark),
        var(--rose-main),
        var(--rose-light),
        var(--rose-main),
        var(--rose-dark)
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* INPUTS */
.form-control{
    border-radius:50px;
    padding:10px 18px;
}
.form-control:focus{
    border-color:var(--rose-main);
    box-shadow:0 0 0 .15rem rgba(183,110,121,.25);
}

/* BUTTON */
.btn-signup{
    border-radius:50px;
    padding:10px;
    background:linear-gradient(135deg,var(--rose-main),var(--rose-light));
    border:none;
    color:white;
    font-weight:500;
    box-shadow:0 10px 25px rgba(183,110,121,.35);
    transition:.3s;
}
.btn-signup:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 35px rgba(183,110,121,.45);
}

/* LINKS */
.login-link{
    color:var(--rose-main);
    text-decoration:none;
    font-weight:500;
}
.login-link:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-6 col-lg-5">

<div class="register-card">

<div class="text-center mb-4">
    <div class="brand">ӄʊռɖǟʟ</div>
    <p class="text-muted mt-2">Join the world of artistic jewellery ✨</p>
</div>

<input class="form-control mb-3" id="name" placeholder="Full Name">
<input class="form-control mb-3" id="phone" placeholder="Phone Number">

<select class="form-control mb-3" id="gender">
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
</select>

<input class="form-control mb-3" id="age" type="number" placeholder="Age">
<input class="form-control mb-3" id="email" type="email" placeholder="Email Address">
<input class="form-control mb-3" id="password" type="password" placeholder="Create Password">
<input class="form-control mb-4" id="confirm_password" type="password" placeholder="Confirm Password">

<button class="btn btn-signup w-100" id="signupBtn" onclick="signup()">
Create Kundal Account
</button>

<div id="msg" class="text-center mt-3 text-danger"></div>

<div class="text-center mt-4">
Already have an account?
<a href="/login" class="login-link">Login</a>
</div>

</div>
</div>
</div>
</div>

<script>
function signup() {
    const data = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        gender: document.getElementById("gender").value,
        age: document.getElementById("age").value,
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm_password").value
    };

    if (!data.name || !data.phone || !data.gender || !data.age ||
        !data.email || !data.password || !data.confirm_password) {
        document.getElementById("msg").innerText = "All fields are required";
        return;
    }

    const btn = document.getElementById("signupBtn");
    btn.disabled = true;
    btn.innerText = "Sending OTP...";

    fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        if (res.success) {
            localStorage.setItem("otp_email", data.email);
            window.location.href = "/verify";
        } else {
            document.getElementById("msg").innerText = res.message;
            btn.disabled = false;
            btn.innerText = "Create Kundal Account";
        }
    })
    .catch(err => {
        document.getElementById("msg").innerText = "Something went wrong ❌";
        btn.disabled = false;
        btn.innerText = "Create Kundal Account";
        console.error(err);
    });
}
</script>

</body>
</html>
