<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>
{% if product %}Edit Product{% else %}Add Product{% endif %}
| Kundal Admin
</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --rose-dark:#8b4a55;
    --rose-main:#b76e79;
    --rose-light:#f7d6cc;
    --soft:#fdf8f2;
}

body{
    background:var(--soft);
    font-family:'Poppins',sans-serif;
}

.box{
    max-width:750px;
    margin:60px auto;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
}

h4{
    font-family:'Cinzel',serif;
}

.btn-primary{
    background:linear-gradient(135deg,var(--rose-main),var(--rose-light));
    border:none;
    border-radius:50px;
}
.btn-primary:hover{
    background:var(--rose-dark);
}

.btn-outline-secondary{
    border-radius:50px;
}

.form-control, .form-select{
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<div class="d-flex justify-content-between mb-4">
<h4>
{% if product %}✏️ Edit Jewellery{% else %}➕ Add Jewellery{% endif %}
</h4>

<a href="/admin/dashboard" class="btn btn-outline-secondary btn-sm">
← Back
</a>
</div>

<form method="post" enctype="multipart/form-data">

<input class="form-control mb-3"
name="product_name"
value="{{ product.product_name if product }}"
placeholder="Product Name (e.g. Rose Gold Jhumka)"
required>

<input class="form-control mb-3"
name="category"
value="{{ product.category if product }}"
placeholder="Category (Earrings, Necklace, Bangles)"
required>

<input class="form-control mb-3"
name="material"
value="{{ product.material if product }}"
placeholder="Material (Gold Plated, Silver, Alloy)"
required>

<input class="form-control mb-3"
name="stone_type"
value="{{ product.stone_type if product }}"
placeholder="Stone Type (Kundan, Pearl, Zircon)">

<input class="form-control mb-3"
name="weight"
value="{{ product.weight if product }}"
placeholder="Weight (grams)">

<input class="form-control mb-3"
name="occasion"
value="{{ product.occasion if product }}"
placeholder="Occasion (Wedding, Party, Casual)">

<input class="form-control mb-3"
name="sku"
value="{{ product.sku if product }}"
placeholder="SKU Code">

<input class="form-control mb-3"
name="price"
value="{{ product.price if product }}"
placeholder="Price"
type="number"
required>

<input class="form-control mb-3"
name="stock"
value="{{ product.stock if product }}"
placeholder="Stock Quantity"
type="number"
min="0"
required>

<select name="status" class="form-select mb-3">
<option value="Active"
{% if product and product.status=="Active" %}selected{% endif %}>
Active
</option>

<option value="Out of Stock"
{% if product and product.status=="Out of Stock" %}selected{% endif %}>
Out of Stock
</option>

<option value="Hidden"
{% if product and product.status=="Hidden" %}selected{% endif %}>
Hidden
</option>
</select>

{% if not product %}
<input type="file" name="image" class="form-control mb-3" required>
{% else %}
<input type="file" name="image" class="form-control mb-3">
{% endif %}

<button class="btn btn-primary w-100">
{% if product %}Update Jewellery{% else %}Add Jewellery{% endif %}
</button>

</form>

</div>
</div>

</body>
</html>
