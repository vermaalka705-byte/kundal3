<!DOCTYPE html>
<html>
<head>
<title>Admin Login | Kundal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --rose-dark:#8b4a55;
    --rose-main:#b76e79;
    --rose-light:#f7d6cc;
    --soft:#fdf8f2;
}

body{
    background:linear-gradient(135deg,var(--rose-light),var(--soft));
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    align-items:center;
}

/* CARD */
.login-card{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
    padding:40px;
}

/* BRAND */
.brand{
    font-family:'Cinzel',serif;
    font-size:28px;
    letter-spacing:3px;
    text-align:center;
    margin-bottom:10px;
    background:linear-gradient(135deg,var(--rose-dark),var(--rose-main),var(--rose-light));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* BUTTON */
.btn-primary{
    background:linear-gradient(135deg,var(--rose-main),var(--rose-light));
    border:none;
    border-radius:50px;
}
.btn-primary:hover{
    background:var(--rose-dark);
}

.form-control{
    border-radius:12px;
}

#msg{
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
<div class="login-card mx-auto" style="max-width:420px">

<div class="brand">ӄʊռɖǟʟ</div>
<h5 class="text-center mb-4">Admin Panel Login</h5>

<input id="admin_id" class="form-control mb-3" placeholder="Admin ID">
<input id="password" type="password" class="form-control mb-4" placeholder="Password">

<button class="btn btn-primary w-100" onclick="adminLogin()">
Login
</button>

<div id="msg" class="text-center mt-3 text-danger"></div>

</div>
</div>

<script>
function adminLogin() {
    fetch("/admin/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            admin_id: admin_id.value,
            password: password.value
        })
    })
    .then(r => r.json())
    .then(r => {
        if (r.success) {
            window.location.href = "/admin/dashboard";
        } else {
            msg.innerText = r.message;
        }
    });
}
</script>

</body>
</html>
