<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ӄʊռɖǟʟ | My Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --rose-dark:#8b4a55;
    --rose-main:#b76e79;
    --rose-light:#f7d6cc;
    --soft:#fdf8f2;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--soft);
    padding-top:80px;
}

/* LOGO */
.navbar-brand{
    font-family:'Cinzel',serif;
    font-size:28px;
    letter-spacing:4px;
    text-transform:lowercase;
    background:linear-gradient(
        135deg,
        var(--rose-dark),
        var(--rose-main),
        var(--rose-light),
        var(--rose-main),
        var(--rose-dark)
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* DROPDOWN */
.dropdown-menu{
    border:none;
    border-radius:20px;
    padding:10px;
    min-width:220px;
    box-shadow:0 20px 45px rgba(0,0,0,.18);
}
.dropdown-item{
    border-radius:12px;
    padding:10px 14px;
}
.dropdown-item:hover{
    background:var(--rose-light);
}

/* PROFILE CARD */
.profile-box{
    max-width:600px;
    margin:40px auto;
    background:#fff;
    padding:40px;
    border-radius:26px;
    box-shadow:0 25px 60px rgba(0,0,0,.15);
}
.profile-box h3{
    font-family:'Playfair Display',serif;
}

/* INPUTS */
.form-control,
.form-select{
    border-radius:50px;
    padding:10px 18px;
}
.form-control:focus,
.form-select:focus{
    border-color:var(--rose-main);
    box-shadow:0 0 0 .15rem rgba(183,110,121,.25);
}

/* BUTTON */
.btn-update{
    border-radius:50px;
    padding:12px;
    background:linear-gradient(135deg,var(--rose-main),var(--rose-light));
    border:none;
    color:white;
    font-weight:500;
    box-shadow:0 10px 25px rgba(183,110,121,.35);
}
.btn-update:hover{
    box-shadow:0 15px 35px rgba(183,110,121,.45);
}

/* FOOTER */
footer{
    margin-top:80px;
    padding:30px 0;
    background:#fff;
    border-top:1px solid #eee;
    text-align:center;
    color:#777;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top">
<div class="container">

<a class="navbar-brand" href="/">ӄʊռɖǟʟ</a>

<div class="ms-auto">
{% if session.user %}
<div class="dropdown d-inline-block">
<a href="#" class="fw-bold text-decoration-none dropdown-toggle"
   data-bs-toggle="dropdown">
    ✨ {{ session.user.name }}
</a>

<ul class="dropdown-menu dropdown-menu-end">
    <li><a class="dropdown-item" href="/profile">Profile</a></li>
    <li><a class="dropdown-item" href="/address">Address</a></li>
    <li><a class="dropdown-item" href="/orders">My Orders</a></li>
    <li><a class="dropdown-item" href="/cart">Add To Cart</a></li>
    <li><a class="dropdown-item" href="/chat-support">Chat Support</a></li>
    <li><a class="dropdown-item" href="/change_password">Change Password</a></li>
    <li><hr class="dropdown-divider"></li>
    <li><a class="dropdown-item text-danger" href="/logout">Logout</a></li>
</ul>
</div>
{% else %}
<a href="/login" class="btn btn-outline-dark btn-sm me-2">Login</a>
<a href="/register" class="btn btn-signup btn-sm">Sign Up</a>
{% endif %}
</div>

</div>
</nav>

<!-- PROFILE -->
<div class="container">
<div class="profile-box">

<h3 class="mb-4 text-center">My Profile</h3>

<form method="post">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" value="{{ user.name }}" required>
</div>

<div class="mb-3">
<label class="form-label">Email (cannot be changed)</label>
<input type="email" class="form-control" value="{{ user.email }}" readonly>
</div>

<div class="mb-3">
<label class="form-label">Phone (cannot be changed)</label>
<input type="text" class="form-control" value="{{ user.phone }}" readonly>
</div>

<div class="mb-3">
<label class="form-label">Gender</label>
<select name="gender" class="form-select">
<option value="Male" {% if user.gender=="Male" %}selected{% endif %}>Male</option>
<option value="Female" {% if user.gender=="Female" %}selected{% endif %}>Female</option>
<option value="Other" {% if user.gender=="Other" %}selected{% endif %}>Other</option>
</select>
</div>

<div class="mb-4">
<label class="form-label">Age</label>
<input type="number" name="age" class="form-control" value="{{ user.age }}" required>
</div>

<button type="submit" class="btn btn-update w-100">
Update Profile
</button>

</form>

<div class="text-center mt-4">
<a href="/" class="text-decoration-none" style="color:var(--rose-main);">
← Back to Home
</a>
</div>

</div>
</div>

<!-- FOOTER -->
<footer>
<div class="container">
<p class="mb-1">© 2026 Kundal Jewellery</p>
<small>Crafted with love & art 🤍</small>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
