<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change Password – Kundal Jewellery</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --rose-dark:#8b4a55;
    --rose-main:#b76e79;
    --rose-light:#f7d6cc;
    --soft:#fdf8f2;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--soft);
    padding-top:90px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* NAVBAR SAME AS HOMEPAGE */
.navbar{
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
}

.navbar-brand{
    font-family:'Cinzel',serif;
    font-size:30px;
    letter-spacing:4px;
    background:linear-gradient(
        135deg,
        var(--rose-dark),
        var(--rose-main),
        var(--rose-light),
        var(--rose-main),
        var(--rose-dark)
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.dropdown-menu{
    border:none;
    border-radius:20px;
    padding:10px;
    min-width:220px;
    box-shadow:0 20px 45px rgba(0,0,0,.18);
}

.dropdown-item{
    border-radius:12px;
    padding:10px 14px;
    font-size:14px;
}

.dropdown-item:hover{
    background:var(--rose-light);
}

/* CARD */
.password-card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 45px rgba(0,0,0,.08);
    max-width:500px;
    margin:auto;
}

/* BUTTONS */
.btn-rose{
    background:var(--rose-main);
    border:none;
    border-radius:50px;
    color:white;
}

.btn-rose:hover{
    background:var(--rose-dark);
    color:white;
}

.btn-outline-rose{
    border:1px solid var(--rose-main);
    color:var(--rose-main);
    border-radius:50px;
}

.btn-outline-rose:hover{
    background:var(--rose-main);
    color:white;
}

/* FOOTER */
footer{
    margin-top:auto;
    padding:40px 0;
    background:#111;
    color:#aaa;
    text-align:center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top shadow-sm">
<div class="container">

<a class="navbar-brand" href="/">ӄʊռɖǟʟ</a>

<div class="ms-auto">
{% if session.user %}
<div class="dropdown">
<a href="#" class="fw-bold text-decoration-none dropdown-toggle"
   data-bs-toggle="dropdown">
    ✨ {{ session.user.name }}
</a>

<ul class="dropdown-menu dropdown-menu-end">
    <li><a class="dropdown-item" href="/profile">Profile</a></li>
    <li><a class="dropdown-item" href="/address">Address</a></li>
    <li><a class="dropdown-item" href="/orders">My Orders</a></li>
    <li><a class="dropdown-item" href="/cart">Cart</a></li>
    <li><a class="dropdown-item" href="/chat-support">Chat Support</a></li>
    <li><a class="dropdown-item" href="/change_password">Change Password</a></li>
    <li><hr class="dropdown-divider"></li>
    <li><a class="dropdown-item text-danger" href="/logout">Logout</a></li>
</ul>
</div>
{% endif %}
</div>

</div>
</nav>

<!-- CONTENT -->
<div class="container mt-4 flex-grow-1 d-flex align-items-center">

<div class="password-card">

<h4 class="text-center mb-4" style="font-family:'Playfair Display',serif;">
🔐 Change Password
</h4>

<div class="text-center mb-3">
<a href="/" class="btn btn-outline-rose btn-sm">
← Back to Home
</a>
</div>

<!-- Email -->
<div class="mb-3">
<label class="form-label">Registered Email</label>
<input type="email" class="form-control" id="email"
placeholder="Enter your registered email">
</div>

<!-- New Password -->
<div class="mb-3">
<label class="form-label">New Password</label>
<input type="password" class="form-control" id="newPassword"
placeholder="Enter new password">
</div>

<!-- Confirm Password -->
<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" class="form-control" id="confirmPassword"
placeholder="Re-enter new password">
</div>

<button class="btn btn-rose w-100 mb-3" onclick="sendOTP()">
Send OTP
</button>

<!-- OTP SECTION -->
<div id="otpSection" style="display:none;">
<div class="mb-3">
<label class="form-label">Enter OTP</label>
<input type="text" class="form-control" id="otp"
placeholder="Enter 6-digit OTP">
</div>

<button class="btn btn-rose w-100" onclick="changePassword()">
Change Password
</button>
</div>

</div>
</div>

<!-- FOOTER -->
<footer>
<div class="container">
<p class="mb-1">© 2026 Kundal Jewellery</p>
<p>Crafted with love & art 🤍</p>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function sendOTP() {
    const email = document.getElementById("email").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!email) return alert("Please enter your registered email");
    if (!newPassword || !confirmPassword) return alert("Please fill both password fields");
    if (newPassword !== confirmPassword) return alert("Passwords do not match");

    fetch("/change_password/send_otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, new_password: newPassword })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) return alert(data.error);
        document.getElementById("otpSection").style.display = "block";
        alert("OTP sent to your email");
    })
    .catch(() => alert("Server error"));
}

function changePassword() {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;

    if (!otp) return alert("Please enter OTP");

    fetch("/change_password/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, otp: otp })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("✅ Password changed successfully");
            window.location.href = "/";
        } else {
            alert(data.error);
        }
    })
    .catch(() => alert("Server error"));
}
</script>

</body>
</html>
